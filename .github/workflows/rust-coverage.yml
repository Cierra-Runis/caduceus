name: Rust Coverage
permissions:
  contents: read

on:
  push:
    branches: [main, dev]
    paths:
      - 'server/**'
      - '.github/workflows/rust-coverage.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'server/**'
      - '.github/workflows/rust-coverage.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest

    steps:
      #  https://github.com/actions/checkout
      - name: Checkout code
        uses: actions/checkout@v5

      # https://github.com/marketplace/actions/cache
      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Rust
        run: rustup override set nightly

      # https://github.com/marketplace/actions/mongodb-in-github-actions
      - name: MongoDB in GitHub Action
        uses: supercharge/mongodb-github-action@1.12.0

      # MinIO for the content-addressed storage integration tests. A plain
      # `services:` container can't launch it (the minio image needs the
      # `server /data` command, which services can't override), so start it as
      # a step and provision the bucket. Endpoint/creds/bucket match the
      # `#[ignore]`d `storage::tests::test_minio_roundtrip`.
      - name: Start MinIO
        run: |
          docker run -d --name minio --network host \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data --address ":9000"
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/ready; then break; fi
            echo "waiting for minio ($i)..."; sleep 1;
          done
          docker run --rm --network host --entrypoint sh minio/mc -c \
            "mc alias set local http://localhost:9000 minioadmin minioadmin && \
             mc mb --ignore-existing local/caduceus"

      # https://github.com/taiki-e/cargo-llvm-cov?tab=readme-ov-file#github-actions-and-codecov
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate code coverage
        working-directory: ./server
        # `--include-ignored` runs the MongoDB-backed repo/database integration
        # tests, which are `#[ignore]`d so a local `cargo test` (no MongoDB)
        # stays green. CI provisions MongoDB above, so it runs the full suite.
        run: cargo llvm-cov --all-features --workspace --lcov --output-path ./target/lcov.info -- --include-ignored

      # https://github.com/codecov/codecov-action
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          name: rust-coverage
          files: ./server/target/lcov.info
          flags: rust
          token: ${{ secrets.CODECOV_TOKEN }}
